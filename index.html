<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dunkin Menu Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #fff3e6;
    }

    header {
      background-color: #ff6f00;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h2 {
      margin: 10px 0 5px 0;
    }

    .card p {
      padding: 0 10px 15px;
      color: #444;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #ff6f00;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  Dunkin Menu
</header>

<div class="container">

  <!-- Strawberry Dragonfruit Refresher -->
  <div class="card">
    <img src="https://source.unsplash.com/600x400/?strawberry,dragonfruit,drink" alt="Strawberry Dragonfruit Refresher">
    <h2>Strawberry Dragonfruit Refresher</h2>
    <p>A refreshing iced drink made with strawberry and dragonfruit flavors.</p>
  </div>

  <!-- Ham & Swiss Croissant -->
  <div class="card">
    <img src="https://source.unsplash.com/600x400/?ham,swiss,croissant,sandwich" alt="Ham and Swiss Croissant">
    <h2>Ham & Swiss Croissant</h2>
    <p>Buttery croissant filled with ham and melted Swiss cheese.</p>
  </div>

</div>

<footer>
  © Dunkin Style Menu Website
</footer>

</body>
</html>
