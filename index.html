<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunkin Menu</title>

<style>
/* BACKGROUND (Dunkin theme + cups pattern) */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #fff3e6;
  background-image: url("https://www.transparenttextures.com/patterns/coffee.png");
}

/* HEADER */
header {
  background: #ff6f00;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* GRID */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 25px;
}

/* CARD */
.card {
  background: white;
  width: 300px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h2 {
  margin: 10px 0 5px;
  text-align: center;
}

.card p {
  padding: 0 10px 15px;
  text-align: center;
  color: #444;
}

/* FOOTER */
footer {
  background: #ff6f00;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  Dunkin Menu ☕🍩
</header>

<div class="container">

  <!-- Strawberry Dragonfruit Refresher -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1615484477778-ca3b77940c25" alt="Strawberry Dragonfruit Refresher">
    <h2>Strawberry Dragonfruit Refresher</h2>
    <p>A refreshing iced drink with strawberry & dragonfruit flavors.</p>
  </div>

  <!-- Ham & Swiss Croissant -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a" alt="Ham and Swiss Croissant">
    <h2>Ham & Swiss Croissant</h2>
    <p>Buttery croissant filled with ham and melted Swiss cheese.</p>
  </div>

</div>

<footer>
  Made with Dunkin vibes ☕
</footer>

</body>
</html>
